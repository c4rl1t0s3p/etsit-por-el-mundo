name: Build JSON and Deploy GitHub Pages

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install pandas openpyxl

      - name: Build oferta.json from Excel
        run: |
          python tools/build_mobility_json.py

      - name: Commit oferta.json if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data/oferta.json
          git diff --cached --quiet || (git commit -m "Auto-generate oferta.json" && git push)

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: ".github"